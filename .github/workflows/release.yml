name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build binary for ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            goos: linux
            goarch: amd64
          - os: linux
            arch: arm64
            goos: linux
            goarch: arm64
          - os: darwin
            arch: amd64
            goos: darwin
            goarch: amd64
          - os: darwin
            arch: arm64
            goos: darwin
            goarch: arm64
          - os: windows
            arch: amd64
            goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build binary
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o skill-mgr-${{ matrix.os }}-${{ matrix.arch }} -ldflags="-s -w" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: skill-mgr-${{ matrix.os }}-${{ matrix.arch }}
          path: skill-mgr-${{ matrix.os }}-${{ matrix.arch }}

  release:
    name: Create release and publish npm
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes "请参见 CHANGELOG" \
            artifacts/*/skill-mgr-*

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # 调试：检查 token 是否可用
          echo "Token length: ${#NODE_AUTH_TOKEN}"
          echo "${NODE_AUTH_TOKEN}" | cut -c1-4
          
          # 设置 npm 认证
          npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}" --location=project
          
          # 测试认证是否生效
          npm whoami 2>&1 || echo "whoami 失败"
          
          # 发布
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          npm pkg set version="${VERSION}"
          npm publish --access public